# Hand-curated symbols for 3310 v5.79 — addresses, message IDs, and RAM
# byte roles that NokiX's LOCATE_*.rx macros don't know about. Merged with
# 3310-v579.nokix.yaml at lookup time (this file wins on name conflicts).
#
# Adding an entry: include `role:` to describe semantics (one line, plain
# text — quoted only if it contains `,` or `}`). Add `docs:` with the doc
# path that explains the finding. `source` is always `overlay` here.
#
# Schema notes:
#   addresses:  one entry per LR/RAM/code address we've named ourselves
#               (or want to overlay onto NokiX's label).
#   messages:   per-msg-ID semantic table (key = MSG_NAME, id = u16).
#   ram:        same shape as addresses; kept separate for organisational
#               clarity even though lookup.py treats them identically.
#
# Verified against: firmware/Factory Reset 3310 NR1 v5.79.fls (fw-id eabb539e —
# hash of the 32-byte canonical MCU version header at offset 0x1FC, EEPROM-
# agnostic; matches flash/My 3310 NR1 v5.79.fls and any code-identical reset).
# Re-run tools/symbols/symbols_check.py after editing.

