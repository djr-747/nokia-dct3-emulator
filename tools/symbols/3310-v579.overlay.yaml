ram:
  # --- Reset/fault state (docs/watchdog-reset-3310.md, docs/dsp-reset-chain-3310-v579.md) ---
  reboot_reason:                   { addr: 0x0011FF94, source: overlay, role: "persisted reset reason byte (read by classifiers, written by REASON_SETTER + REBOOT_FN)" }
  reboot_save:                     { addr: 0x0011FF88, source: overlay, role: "fatal handler 3-word save block (LR, SPSR, CPSR)" }
  task4_retry_counter:             { addr: 0x00111862, source: overlay, role: "task 4 retry counter — first msg 0xE4 → stage SWDSP/DSP reset, second → suppress" }
  broker_supervisor_counter:       { addr: 0x0011FF1A, source: overlay, role: "task-2 broker WDT-kick supervisor — overflows at 15, calls REBOOT_FN([reboot_reason])" }

  # --- Subsystem state ---
  verdict_byte:                    { addr: 0x0011FF15, source: overlay, role: "boot self-test verdict (HLE 0xC8 by spike, organic via DSP responder)" }
  sim_gate_byte:                   { addr: 0x0011FD1B, source: overlay, role: "disp49 SIM-gate bypass byte (anon-access poke)" }
  sim_retry_counter:               { addr: 0x0011FD08, source: overlay, role: "SIM recognition retry counter (overflows -> task 4 msg 0xE4)" }
  phone_mode_byte:                 { addr: 0x0010E71A, source: overlay, role: "phone mode (1=PON, 2/3=NORMAL, 5/6=variant) — gated by REASON_SETTER" }
  framebuffer_ptr:                 { addr: 0x0010FD9C, source: overlay, role: "LCD framebuffer pointer (alloc'd by WINDOW_MGR_FN)" }
  faid_checksum:                   { addr: 0x00111B8A, source: overlay, role: "FAID integrity checksum (FuBu v6.39 expects 0x03B7)" }
  dsp_uploaded_flag:               { addr: 0x0011038C, source: overlay, role: "DSP code-block upload complete flag" }
  dsp_ready_flag1:                 { addr: 0x00135665, source: overlay, role: "DSP boot ready flag 1 (set by [0x10004]=6 responder)" }
  dsp_ready_flag2:                 { addr: 0x00135664, source: overlay, role: "DSP boot ready flag 2 (set by IRQ4 ISR 0x2CB418)" }
  rng_seed:                        { addr: 0x00111864, source: overlay, role: "ANSI LCG seed (srand at boot; seeded by time()=0x7FFFFFFF in emu)" }
  centisec_counter:                { addr: 0x0011139C, source: overlay, role: "stopwatch centisecond up-counter (++ by FIQ8 100Hz)" }
  countdown_counter:               { addr: 0x00111398, source: overlay, role: "stopwatch countdown counter" }

  # --- Kernel data structures (docs/task-map-3310.md) ---
  tcb_table:                       { addr: 0x00106130, source: overlay, role: "TCB table — 24 entries × 16 bytes (idx+14, state+13, pri+12, ctx+8)" }
  mailbox_ring_table:              { addr: 0x00105E90, source: overlay, role: "per-task mailbox ring — 28 bytes/task (head+16, tail+17, cap from 0x10485C)" }
  per_task_pending_count:          { addr: 0x00104884, source: overlay, role: "per-task pending msg counter — indexed by task id" }
  tasks_init_table:                { addr: 0x0031C30C, source: overlay, role: "static task table (24 × 12 B: handler|1, stack-size, priority)" }

messages:
  # Per-task / per-broker message IDs we've identified during RE. NokiX itself
  # has no locator for these — they're pure semantic constants the firmware uses.
  # Format: id is the literal value the firmware emits on the wire (uint16).
  MSG_KEY_DOWN:                    { id: 0x0366, role: "soft key down (per-key dispatch — see KEY_DOWN/UP family)" }
  MSG_KEY_UP:                      { id: 0x0367, role: "soft key up (per-key dispatch)" }
  MSG_KEY_RELEASE:                 { id: 0x00C9, role: "menu/key-release sentinel (terminates auto-repeat)" }
  MSG_DIALOG_DRAW:                 { id: 0x057C, role: "DIALOG_DRAW — redraw the currently-open dialog" }
  MSG_DIALOG_OPEN_RAW:             { id: 0x0578, role: "DIALOG_OPEN constructs msg id 0xAF*8 — passes to DIALOG_OPEN_MSG" }
  MSG_DISPLAY_MESSAGE:             { id: 0x0226, role: "MSG_DISPLAY_MESSAGE — show a static text id (DMI_WARNING/INFO)" }
  MSG_DISPLAY_MESSAGE_HI:          { id: 0x8226, role: "DISPLAY_MESSAGE with high-bit set — keypress-relaunch variant" }
  MSG_CREATE_WIN:                  { id: 0x4C3A, role: "create-window msg — handler 0x26DFEE, never fires in incomplete boot" }
  MSG_PHONE_STARTUP_SWEEP:         { id: 0x13B5, role: "post-PON GSM-driven re-sweep — triggers dialog re-broadcast" }
  MSG_LIFECYCLE:                   { id: 0x0130, role: "lifecycle state change (PHONE_STARTUP, IDLE, …)" }

  # --- Task-2 broker message dispatch table (function 0x2442B4 case-DA..E3) ---
  MSG_T2_WDT_KICK:                 { id: 0x00DA, role: "task-2 broker — case 0xDA: kick WDT + bump supervisor counter" }
  MSG_T2_VERDICT_CHECK:            { id: 0x00DB, role: "task-2 broker — case 0xDB: check [verdict_byte] bit3" }
  MSG_T2_REBOOT_REISSUE:           { id: 0x00DC, role: "task-2 broker — case 0xDC: read [reboot_reason], call REBOOT_FN" }

  # --- Task-4 fatal-reset dispatcher (handler 0x2EDB04 dispatch) ---
  MSG_T4_MDI_FAULT:        { id: 0x00E4, role: "task-4 MDI/DSP receiver msg — first fire stages SWDSP DSP-reset scenario, reason 0x68 (SWDSP / DSP-watchdog)" }

  # --- Reset poster (fn 0x2E0F20) sends ---
  MSG_T1_RESET_REQUEST:            { id: 0x001B, role: "task 1 — graceful-shutdown reset request from RESET_POSTER" }
  MSG_CH28_SHUTDOWN:               { id: 0x007D, role: "broker fan-out (ch 28) — shutdown subscribers" }

  # --- Broker fault notifier (0x2D724C) sends ---
  MSG_T17_BROKER_FAULT:            { id: 0x0044, role: "task 17 (charge SM) — broker fault notify from 0x2D724C" }

  # --- Assertion codes (firmware-internal fault IDs, captured by ASSERT_LOG) ---
  ASSERT_BROKER_FAULT:             { id: 0x5B06, role: "broker fault — emitted by BROKER_FAULT_NOTIFIER + REBOOT_FN's notify" }
